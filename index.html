<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>3D 카트라이더 (기깔난 카트 & 백 드리프트 완벽 복구)</title>
<style>
  body { margin: 0; overflow: hidden; background-color: #f0f0f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  
  /* --- 🎮 게임 내 UI (In-Game) --- */
  #gameUI { display: none; }
  #hud { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.65); padding: 15px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; }
  .gauge-container { width: 250px; height: 20px; background: rgba(255,255,255,0.2); border: 2px solid white; margin-top: 10px; border-radius: 10px; overflow: hidden; }
  #gauge { width: 0%; height: 100%; background: #3498db; transition: width 0.1s; }
  #boosterSlots { display: flex; gap: 10px; margin-top: 10px; }
  .slot { width: 50px; height: 15px; border: 2px solid white; border-radius: 8px; background: rgba(0,0,0,0.5); transition: all 0.2s; }
  .slot.filled { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; }
  .controls-info { position: absolute; bottom: 20px; left: 20px; color: rgba(255,255,255,0.9); font-size: 15px; background: rgba(0,0,0,0.65); padding: 10px 15px; border-radius: 8px; z-index: 10; }
  #techAlert { 
    position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
    font-size: 48px; color: #f1c40f; font-weight: 900; font-style: italic; 
    opacity: 0; transition: opacity 0.2s; text-shadow: 0 0 20px #e67e22, 3px 3px 0px #d35400; 
    z-index: 9999; pointer-events: none; 
  }

  /* --- 🏠 로비 UI (Start Screen) --- */
  #lobbyUI {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding-bottom: 50px; z-index: 100;
    background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.15) 100%);
  }
  .lobby-title {
    position: absolute; top: 50px;
    font-size: 64px; color: white; font-weight: 900; font-style: italic;
    text-shadow: 4px 4px 0px #3498db, 8px 8px 15px rgba(0,0,0,0.5);
    letter-spacing: 2px;
  }
  .menu-container { display: flex; gap: 30px; margin-bottom: 40px; }
  .menu-btn {
    width: 140px; height: 140px; border-radius: 20px; border: 4px solid rgba(255,255,255,0.9);
    background: rgba(44, 62, 80, 0.85); color: white; font-size: 20px; font-weight: bold;
    cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3); backdrop-filter: blur(5px);
  }
  .menu-btn:hover {
    transform: translateY(-10px) scale(1.05);
    background: rgba(52, 152, 219, 0.95); border-color: white;
    box-shadow: 0 15px 25px rgba(52, 152, 219, 0.5);
  }
  .menu-btn span { font-size: 40px; margin-bottom: 10px; }
  
  #startBtn {
    padding: 20px 80px; font-size: 32px; font-weight: 900; color: white;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 8px 0px #902b1f, 0 15px 20px rgba(0,0,0,0.4);
    transition: all 0.1s; letter-spacing: 2px;
  }
  #startBtn:active { transform: translateY(8px); box-shadow: 0 0px 0px #902b1f, 0 5px 10px rgba(0,0,0,0.4); }
  #startBtn:hover { filter: brightness(1.1); }

  /* --- 👤 캐릭터 선택 모달창 --- */
  #charModal {
    display: none; position: absolute; top: 50%; right: 50px; transform: translateY(-50%);
    background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
    padding: 30px; border-radius: 20px;
    box-shadow: -10px 10px 30px rgba(0,0,0,0.3); text-align: center; z-index: 200;
    flex-direction: column; gap: 15px; width: 280px; border: 3px solid #eee;
  }
  #charModal h2 { margin: 0; color: #2c3e50; font-size: 26px; }
  .char-list { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
  .char-item {
    padding: 15px; font-size: 22px; font-weight: bold; color: white;
    border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s;
  }
  .char-item:hover { transform: scale(1.05) translateX(-5px); }
  .char-dao { background: #1565c0; box-shadow: 0 4px 0 #0d47a1; }
  .char-bazzi { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; }
  .char-dizzy { background: #f1c40f; color: #333; box-shadow: 0 4px 0 #f39c12; }
  .close-modal { 
    margin-top: 15px; padding: 12px; font-size: 18px; font-weight: bold;
    background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; 
    box-shadow: 0 4px 0 #27ae60; transition: transform 0.1s;
  }
  .close-modal:active { transform: translateY(4px); box-shadow: 0 0px 0 #27ae60; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="lobbyUI">
  <div class="lobby-title">3D KART RIDER</div>
  <div class="menu-container">
    <button class="menu-btn" onclick="alert('맵 선택 기능은 준비 중입니다!')"><span>🗺️</span>맵 선택</button>
    <button class="menu-btn" onclick="openCharModal()"><span>👤</span>캐릭터</button>
    <button class="menu-btn" onclick="alert('카트 선택 기능은 준비 중입니다!')"><span>🏎️</span>카트 바디</button>
    <button class="menu-btn" onclick="alert('설정 기능은 준비 중입니다!')"><span>⚙️</span>설정</button>
  </div>
  <button id="startBtn">GAME START</button>
</div>

<div id="charModal">
  <h2>레이서 선택</h2>
  <p style="margin:0; color:#666; font-size:13px;">선택 시 즉시 3D로 미리보기가 적용됩니다.</p>
  <div class="char-list">
    <button class="char-item char-dao" onclick="previewCharacter('dao')">다오 (Dao)</button>
    <button class="char-item char-bazzi" onclick="previewCharacter('bazzi')">배찌 (Bazzi)</button>
    <button class="char-item char-dizzy" onclick="previewCharacter('dizzy')">디지니 (Dizzy)</button>
  </div>
  <button class="close-modal" onclick="closeCharModal()">선택 완료</button>
</div>

<div id="gameUI">
  <div id="hud">
    <h2 style="margin:0; text-shadow: none;">속도: <span id="speedDisplay">0</span> km/h</h2>
    <div class="gauge-container"><div id="gauge"></div></div>
    <div id="boosterSlots">
      <div class="slot" id="slot1"></div>
      <div class="slot" id="slot2"></div>
    </div>
    <p id="boostStatus" style="font-weight:bold; color:white; margin-top: 8px; text-shadow: none;">드리프트(Shift)로 부스터를 모으세요</p>
  </div>
  <div id="techAlert">순간 부스터!</div>
  <div class="controls-info">
    <strong>[방향키]</strong> 이동(전진/후진) &nbsp;&nbsp;|&nbsp;&nbsp; <strong>[Shift]</strong> 드리프트 &nbsp;&nbsp;|&nbsp;&nbsp; <strong>[Ctrl]</strong> 부스터 발동
  </div>
</div>

<script>
// ==========================================
// 1. Three.js 기본 환경 설정
// ==========================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe0e5ec);
scene.fog = new THREE.Fog(0xe0e5ec, 100, 600);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
document.body.appendChild(renderer.domElement);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
dirLight.position.set(20, 50, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
scene.add(dirLight);

const planeGeom = new THREE.PlaneGeometry(10000, 10000);
const planeMat = new THREE.MeshLambertMaterial({color: 0xffffff});
const plane = new THREE.Mesh(planeGeom, planeMat);
plane.rotation.x = -Math.PI / 2;
plane.receiveShadow = true;
scene.add(plane);
const gridHelper = new THREE.GridHelper(10000, 500, 0xcccccc, 0xe0e0e0);
scene.add(gridHelper);

// ==========================================
// 2. 완벽한 캐릭터 조형 (디지니 은색 링 복구 & 1.5배 스케일업)
// ==========================================
let frontWheelL, frontWheelR; 

function createCharacterModel(type) {
    const group = new THREE.Group();
    let mainColor = 0x1565c0; // 다오 파랑
    if(type === 'bazzi') mainColor = 0xe74c3c;
    if(type === 'dizzy') mainColor = 0xf1c40f;

    const headGroup = new THREE.Group();
    headGroup.position.y = 2.0; 

    // 공통 둥근 얼굴
    const headMat = new THREE.MeshLambertMaterial({color: mainColor});
    const centerMesh = new THREE.Mesh(new THREE.SphereGeometry(1.3, 32, 32), headMat);
    centerMesh.castShadow = true;
    headGroup.add(centerMesh);

    if (type === 'dao' || !type) {
        const lobeGeom = new THREE.SphereGeometry(0.95, 32, 32); 
        const lobeL = new THREE.Mesh(lobeGeom, headMat); 
        lobeL.position.set(-0.8, 0, 0); 
        lobeL.castShadow = true;
        headGroup.add(lobeL);
        
        const lobeR = new THREE.Mesh(lobeGeom, headMat); 
        lobeR.position.set(0.8, 0, 0); 
        lobeR.castShadow = true;
        headGroup.add(lobeR);
    } 
    else if (type === 'bazzi') {
        const earGeom = new THREE.SphereGeometry(0.45, 16, 16);
        const earL = new THREE.Mesh(earGeom, headMat); 
        earL.position.set(-0.75, 1.1, 0); 
        earL.castShadow = true;
        headGroup.add(earL);
        
        const earR = new THREE.Mesh(earGeom, headMat); 
        earR.position.set(0.75, 1.1, 0); 
        earR.castShadow = true;
        headGroup.add(earR);
    } 
    else if (type === 'dizzy') {
        const podGeom = new THREE.SphereGeometry(0.55, 32, 32); 
        const ringGeom = new THREE.TorusGeometry(0.55, 0.12, 16, 32); 
        const ringMat = new THREE.MeshLambertMaterial({color: 0xcccccc}); 
        
        const podL = new THREE.Mesh(podGeom, headMat);
        podL.position.set(-0.85, 0.9, -0.6); 
        podL.castShadow = true;
        headGroup.add(podL);

        const ringL = new THREE.Mesh(ringGeom, ringMat);
        ringL.position.copy(podL.position);
        ringL.lookAt(0, 0, 0); 
        headGroup.add(ringL);
        
        const podR = new THREE.Mesh(podGeom, headMat);
        podR.position.set(0.85, 0.9, -0.6); 
        podR.castShadow = true;
        headGroup.add(podR);

        const ringR = new THREE.Mesh(ringGeom, ringMat);
        ringR.position.copy(podR.position);
        ringR.lookAt(0, 0, 0); 
        headGroup.add(ringR);
    }

    group.add(headGroup);

    const bodyGeom = new THREE.CylinderGeometry(0.7, 0.9, 1.2, 16);
    const bodyMat = new THREE.MeshLambertMaterial({color: mainColor});
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.position.y = 0.6;
    body.castShadow = true;
    group.add(body);

    group.scale.set(1.5, 1.5, 1.5);
    return group;
}

// ==========================================
// 3. 기깔난 스포츠 카트 바디 복구
// ==========================================
function createKart() {
  const kartRoot = new THREE.Group(); 
  const kartBody = new THREE.Group(); 
  kartRoot.add(kartBody);

  const whiteMat = new THREE.MeshLambertMaterial({color: 0xf5f6fa});
  const blueMat = new THREE.MeshLambertMaterial({color: 0x3498db});
  const darkMat = new THREE.MeshLambertMaterial({color: 0x2c3e50});
  const blackMat = new THREE.MeshLambertMaterial({color: 0x111111});

  const chassis = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.5, 5.0), darkMat);
  chassis.position.y = 0.5;
  chassis.castShadow = true;
  kartBody.add(chassis);

  const nose = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.5, 1.5), whiteMat);
  nose.position.set(0, 0.6, 2.8);
  nose.castShadow = true;
  kartBody.add(nose);

  const noseAccent = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.6, 1.8), blueMat);
  noseAccent.position.set(0, 0.9, 2.3);
  noseAccent.rotation.x = Math.PI / 12; 
  noseAccent.castShadow = true;
  kartBody.add(noseAccent);

  const sideL = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.8, 3.2), whiteMat);
  sideL.position.set(-1.4, 0.7, 0.5); sideL.castShadow = true;
  kartBody.add(sideL);
  
  const sideR = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.8, 3.2), whiteMat);
  sideR.position.set(1.4, 0.7, 0.5); sideR.castShadow = true;
  kartBody.add(sideR);

  const engine = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.2, 1.6), darkMat);
  engine.position.set(0, 1.1, -1.8); engine.castShadow = true;
  kartBody.add(engine);

  const seat = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.6, 0.4), darkMat);
  seat.position.set(0, 1.5, -0.9);
  seat.rotation.x = -Math.PI / 16; 
  seat.castShadow = true;
  kartBody.add(seat);

  const steerColumn = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.2), darkMat);
  steerColumn.position.set(0, 1.4, 1.4);
  steerColumn.rotation.x = Math.PI / 4;
  kartBody.add(steerColumn);
  
  const steerWheel = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.1, 8, 24), blackMat);
  steerWheel.position.set(0, 1.8, 1.0);
  steerWheel.rotation.x = Math.PI / 4;
  kartBody.add(steerWheel);

  const spoilerWing = new THREE.Mesh(new THREE.BoxGeometry(4.2, 0.2, 1.2), blueMat);
  spoilerWing.position.set(0, 2.5, -2.8); spoilerWing.castShadow = true;
  kartBody.add(spoilerWing);
  
  const supportL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.2, 0.8), whiteMat);
  supportL.position.set(-1.2, 1.9, -2.5); supportL.castShadow = true;
  kartBody.add(supportL);
  
  const supportR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.2, 0.8), whiteMat);
  supportR.position.set(1.2, 1.9, -2.5); supportR.castShadow = true;
  kartBody.add(supportR);

  kartRoot.charSlot = new THREE.Group();
  kartRoot.charSlot.position.set(0, 1.6, -0.2); 
  kartBody.add(kartRoot.charSlot);

  const wheelGeom = new THREE.CylinderGeometry(0.8, 0.8, 0.8, 24);
  wheelGeom.rotateZ(Math.PI / 2); 
  const wheelMat = new THREE.MeshLambertMaterial({color: 0x111111});
  
  frontWheelL = new THREE.Group(); frontWheelL.position.set(-2.0, 0.8, 2.5); 
  const fwlMesh = new THREE.Mesh(wheelGeom, wheelMat); fwlMesh.castShadow = true; frontWheelL.add(fwlMesh); kartBody.add(frontWheelL);
  
  frontWheelR = new THREE.Group(); frontWheelR.position.set(2.0, 0.8, 2.5);
  const fwrMesh = new THREE.Mesh(wheelGeom, wheelMat); fwrMesh.castShadow = true; frontWheelR.add(fwrMesh); kartBody.add(frontWheelR);
  
  const backWheelL = new THREE.Mesh(wheelGeom, wheelMat); backWheelL.position.set(-2.0, 0.8, -2); backWheelL.castShadow = true; kartBody.add(backWheelL);
  const backWheelR = new THREE.Mesh(wheelGeom, wheelMat); backWheelR.position.set(2.0, 0.8, -2); backWheelR.castShadow = true; kartBody.add(backWheelR);

  const exhaustGeom = new THREE.CylinderGeometry(0.3, 0.3, 0.5, 12);
  exhaustGeom.rotateX(Math.PI / 2);
  const exhaustMat = new THREE.MeshLambertMaterial({color: 0x7f8c8d});
  const ex1 = new THREE.Mesh(exhaustGeom, exhaustMat); ex1.position.set(-0.8, 0.8, -2.8); kartBody.add(ex1);
  const ex2 = new THREE.Mesh(exhaustGeom, exhaustMat); ex2.position.set(0.8, 0.8, -2.8); kartBody.add(ex2);

  const fireGeom = new THREE.ConeGeometry(0.6, 3.0, 12);
  fireGeom.rotateX(-Math.PI / 2);
  const fireMat = new THREE.MeshBasicMaterial({color: 0x3498db}); 
  kartRoot.fire1 = new THREE.Mesh(fireGeom, fireMat); kartRoot.fire1.position.set(-0.8, 0.8, -4.2); kartRoot.fire1.visible = false; kartBody.add(kartRoot.fire1);
  kartRoot.fire2 = new THREE.Mesh(fireGeom, fireMat); kartRoot.fire2.position.set(0.8, 0.8, -4.2); kartRoot.fire2.visible = false; kartBody.add(kartRoot.fire2);
  
  const shadowGeom = new THREE.CircleGeometry(4.5, 32); 
  shadowGeom.rotateX(-Math.PI / 2);
  shadowGeom.scale(1, 1, 1.8); 
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.25, depthWrite: false });
  const fakeShadow = new THREE.Mesh(shadowGeom, shadowMat);
  fakeShadow.position.y = 0.05; 
  kartRoot.add(fakeShadow);

  kartRoot.bodyWrapper = kartBody; 
  return kartRoot;
}

const carMesh = createKart();
scene.add(carMesh);

function changeCharacter(type) {
    carMesh.charSlot.clear(); 
    carMesh.charSlot.add(createCharacterModel(type)); 
}
// 디지니 기본 선택
changeCharacter('dizzy'); 

// ==========================================
// 3. 로비 스크립트
// ==========================================
let isGameRunning = false;
let lobbyAnimId;

camera.position.set(13, 10, 18);
camera.lookAt(new THREE.Vector3(0, 3, 0));

function animateLobby() {
    if (isGameRunning) return;
    lobbyAnimId = requestAnimationFrame(animateLobby);
    carMesh.rotation.y -= 0.01; 
    renderer.render(scene, camera);
}
animateLobby();

function openCharModal() { document.getElementById('charModal').style.display = 'flex'; }
function closeCharModal() { document.getElementById('charModal').style.display = 'none'; }
function previewCharacter(type) { changeCharacter(type); }

// ==========================================
// 4. 물리 엔진 변수
// ==========================================
const skidMarks = [];
const skidGeom = new THREE.PlaneGeometry(0.6, 1.0);
const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, Shift: false, Control: false };
window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

const MAX_NORMAL = 150 / 60;   
const MAX_INSTANT = 174 / 60;  
const MAX_BOOST = 240 / 60;    
const MAX_REVERSE = -120 / 60; // 💡 [수정] 백 드리프트를 위해 최대 후진 속도를 -120km/h로 상향

const car = {
  speed: 0, accel: 0.02, boostAccel: 0.06, instantAccel: 0.035, 
  turnSpeed: 0.04, driftTurnSpeed: 0.06, 
  grip: 0.15, driftGrip: 0.015, currentGrip: 0.15, 
  angle: 0, velocityAngle: 0, gauge: 0, boosterCount: 0, maxBoosters: 2,
  isBoosting: false, boostTime: 0,
  driftState: 0, boostsGainedThisDrift: 0, lastAngleDiff: 0, 
  wasDrifting: false, instantBoostWindow: 0, canTriggerInstant: false, 
  isInstantBoosting: false, instantBoostTimer: 0, toktokiTimer: 0,
  visualRoll: 0, rollVelocity: 0, visualPitch: 0, pitchVelocity: 0, steerAngle: 0    
};

const cameraLookTarget = new THREE.Vector3();

function showTechAlert(text, color) {
  const el = document.getElementById('techAlert');
  el.innerText = text; el.style.color = color; el.style.opacity = 1;
  setTimeout(() => { el.style.opacity = 0; }, 800);
}

// ==========================================
// 💡 5. 인게임 물리 루프 (백 드리프트 완벽 복구 패치)
// ==========================================
function animateGame() {
  if (!isGameRunning) return;
  requestAnimationFrame(animateGame);

  if (keys.Control && car.boosterCount > 0 && !car.isBoosting) {
    if (car.speed >= 0) {
        car.isBoosting = true; car.boosterCount--; car.boostTime = 150;
    }
  }
  if (car.isBoosting) { 
    car.boostTime--; if(car.boostTime <= 0) car.isBoosting = false; 
  }

  let absSpeed = Math.abs(car.speed);
  // 💡 [수정] 후진 중에도 드리프트 허용 (Shift + 속도 절댓값 > 0.5)
  let isDrifting = keys.Shift && absSpeed > 0.5;
  
  if (isDrifting) car.driftState = 1; 
  else if (car.driftState === 1 && Math.abs(car.lastAngleDiff) > 0.1) car.driftState = 2; 
  else if (car.driftState === 2 && Math.abs(car.lastAngleDiff) < 0.04) car.driftState = 0; 
  else if (!isDrifting && Math.abs(car.lastAngleDiff) < 0.1) car.driftState = 0; 

  if (car.driftState === 0) car.boostsGainedThisDrift = 0; 
  let isDragging = (car.driftState === 2);
  let isSliding = isDrifting || isDragging; 

  if (!isDrifting && car.wasDrifting && Math.abs(car.lastAngleDiff) > 0.08 && car.speed >= 0) {
    car.instantBoostWindow = 30; 
    car.canTriggerInstant = !keys.ArrowUp; 
  }
  
  if (car.instantBoostWindow > 0) {
    car.instantBoostWindow--;
    if (car.speed >= 0) {
        if (!keys.ArrowUp) car.canTriggerInstant = true;
        if (keys.ArrowUp && car.canTriggerInstant && !car.isInstantBoosting) {
          car.isInstantBoosting = true; car.instantBoostTimer = 30; car.instantBoostWindow = 0; car.speed += 0.3; 
          showTechAlert("순간 부스터!", "#f1c40f");
          if (Math.abs(car.lastAngleDiff) < 0.3) { car.driftState = 0; car.currentGrip = 0.8; }
        }
    }
  }
  
  if (car.isInstantBoosting) {
    car.instantBoostTimer--; if (car.instantBoostTimer <= 0) car.isInstantBoosting = false;
  }
  car.wasDrifting = isDrifting; 

  let currentMax = car.isBoosting ? MAX_BOOST : (car.isInstantBoosting ? MAX_INSTANT : MAX_NORMAL);
  let currentAccel = car.isBoosting ? car.boostAccel : (car.isInstantBoosting ? car.instantAccel : car.accel);
  let hardLimit = currentMax;

  let speedPenalty = Math.max(0.5, 1.0 - (absSpeed / 6.0)); 
  let tSpeed = (isSliding ? car.driftTurnSpeed : car.turnSpeed) * speedPenalty;
  
  let targetSteer = 0; 
  let steerDir = (car.speed >= 0) ? 1 : -1; // 💡 후진 조향 방향 전환 로직
  
  if (absSpeed > 0.1) {
    if (keys.ArrowLeft) { car.angle += tSpeed * steerDir; targetSteer = 0.5 * steerDir; }
    if (keys.ArrowRight) { car.angle -= tSpeed * steerDir; targetSteer = -0.5 * steerDir; }
  }

  car.steerAngle += (targetSteer - car.steerAngle) * 0.2;
  frontWheelL.rotation.y = car.steerAngle; frontWheelR.rotation.y = car.steerAngle;

  let angleDiff = car.angle - car.velocityAngle;
  while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
  while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

  const MAX_SLIP = 1.5; 
  if (isSliding) {
      if (angleDiff > MAX_SLIP) { car.angle = car.velocityAngle + MAX_SLIP; angleDiff = MAX_SLIP; } 
      else if (angleDiff < -MAX_SLIP) { car.angle = car.velocityAngle - MAX_SLIP; angleDiff = -MAX_SLIP; }
  }
  car.lastAngleDiff = angleDiff;

  let targetGrip = isSliding ? car.driftGrip : car.grip;
  
  // 💡 [수정] 후진 드리프트 중 조향 강제 회복(뉴커팅) 버그 완벽 해결
  let isOppositeDir = false;
  if (steerDir === 1) {
      isOppositeDir = (angleDiff > 0.2 && keys.ArrowRight) || (angleDiff < -0.2 && keys.ArrowLeft);
  } else {
      isOppositeDir = (angleDiff > 0.2 && keys.ArrowLeft) || (angleDiff < -0.2 && keys.ArrowRight);
  }

  if (isSliding && isOppositeDir) {
    targetGrip = 0.5; car.driftState = 0; 
    if (Math.abs(angleDiff) > 0.3 && Math.random() < 0.1 && car.speed >= 0) showTechAlert("뉴커팅!", "#e74c3c");
  }
  
  let gripRecoverySpeed = isDrifting ? 0.2 : (isDragging ? 0.002 : 0.1); 
  car.currentGrip += (targetGrip - car.currentGrip) * gripRecoverySpeed; 
  car.velocityAngle += angleDiff * car.currentGrip;

  let speedBefore = car.speed; 
  let drag = 0.002 * (absSpeed * absSpeed); 

  if (keys.ArrowUp) { 
      car.speed += currentAccel; 
      if (car.speed > 0) car.speed -= drag;
      else car.speed += drag;
  } 
  else if (keys.ArrowDown) { 
      car.speed -= 0.03; 
      if (car.speed > 0) car.speed -= drag;
      else car.speed += drag;
  } 
  else { 
      if (car.speed > 0) {
          car.speed -= drag + 0.01;
          if (car.speed < 0) car.speed = 0;
      } else if (car.speed < 0) {
          car.speed += drag + 0.01;
          if (car.speed > 0) car.speed = 0;
      }
  }

  if (isDrifting) {
      if (keys.ArrowUp && car.speed > 0) {
          car.speed *= 0.995; 
          if (Math.abs(angleDiff) > 0.8) car.speed *= 0.985; 
      } else if (keys.ArrowDown && car.speed < 0) {
          car.speed *= 0.995;
          if (Math.abs(angleDiff) > 0.8) car.speed *= 0.985;
      }
  }

  let isMatchingDir = (angleDiff > 0.15 && keys.ArrowLeft) || (angleDiff < -0.15 && keys.ArrowRight);
  let isUserTokToki = isDragging && keys.ArrowUp && isMatchingDir && Math.abs(angleDiff) < 0.95 && (car.isBoosting || car.isInstantBoosting);

  if (isUserTokToki) {
    car.speed += 0.015; car.toktokiTimer = 45; 
    if (Math.random() < 0.05) showTechAlert("톡톡이 가속!", "#3498db");
  } else if (isDragging && keys.ArrowUp) { car.speed += 0.001; }

  if (car.toktokiTimer > 0) {
      car.toktokiTimer--;
      if (car.isBoosting) hardLimit = 260 / 60; else if (car.isInstantBoosting) hardLimit = 174 / 60; else hardLimit = 155 / 60; 
  } else if (isDragging) {
      if (car.isBoosting) hardLimit = 250 / 60; else if (car.isInstantBoosting) hardLimit = 174 / 60; else hardLimit = 150 / 60; 
  }

  if (car.speed > hardLimit) {
      if (speedBefore > hardLimit + 0.03) car.speed = Math.min(car.speed, speedBefore - 0.03); 
      else car.speed = hardLimit;
  }
  if (car.speed < MAX_REVERSE) {
      car.speed = MAX_REVERSE; 
  }

  carMesh.position.x += Math.sin(car.velocityAngle) * car.speed;
  carMesh.position.z += Math.cos(car.velocityAngle) * car.speed;
  carMesh.rotation.y = car.angle;

  const springStiffness = 0.1; const damping = 0.85;        
  let targetRoll = -angleDiff * (absSpeed / 4.0) * 0.4; 
  targetRoll = Math.max(-0.25, Math.min(0.25, targetRoll)); 
  
  let rollForce = (targetRoll - car.visualRoll) * springStiffness;
  car.rollVelocity += rollForce; car.rollVelocity *= damping; car.visualRoll += car.rollVelocity;
  carMesh.bodyWrapper.rotation.z = car.visualRoll;

  let targetPitch = 0;
  if (keys.ArrowUp) targetPitch = -0.04 * (car.speed / 4.0); 
  if (keys.ArrowDown) targetPitch = 0.08 * (Math.max(car.speed, 0) / 4.0); 
  if (car.isBoosting || car.isInstantBoosting) targetPitch = -0.1; 
  
  let pitchForce = (targetPitch - car.visualPitch) * springStiffness;
  car.pitchVelocity += pitchForce; car.pitchVelocity *= damping; car.visualPitch += car.pitchVelocity;
  carMesh.bodyWrapper.rotation.x = car.visualPitch;

  // 💡 [수정] 스키드 마크 발동 최저 속도를 완화하여 후진 시에도 시원하게 나타나게 함 (1 -> 0.5)
  if (Math.abs(angleDiff) > 0.08 && absSpeed > 0.5 && car.currentGrip < 0.12) {
    const skidMat = new THREE.MeshBasicMaterial({ color: 0x222222, transparent: true, opacity: 0.5, depthWrite: false });
    const dirX = Math.sin(car.angle); const dirZ = Math.cos(car.angle);
    const rightX = Math.cos(car.angle); const rightZ = -Math.sin(car.angle);
    
    const markL = new THREE.Mesh(skidGeom, skidMat);
    markL.rotation.x = -Math.PI / 2; markL.rotation.z = -car.angle;
    markL.position.set(carMesh.position.x - dirX * 2.0 - rightX * 1.5, 0.05, carMesh.position.z - dirZ * 2.0 - rightZ * 1.5);
    scene.add(markL); skidMarks.push(markL);

    const markR = new THREE.Mesh(skidGeom, skidMat);
    markR.rotation.x = -Math.PI / 2; markR.rotation.z = -car.angle;
    markR.position.set(carMesh.position.x - dirX * 2.0 + rightX * 1.5, 0.05, carMesh.position.z - dirZ * 2.0 + rightZ * 1.5);
    scene.add(markR); skidMarks.push(markR);
  }

  for (let i = skidMarks.length - 1; i >= 0; i--) {
    let mark = skidMarks[i]; mark.material.opacity -= 0.005; 
    if (mark.material.opacity <= 0) { scene.remove(mark); mark.material.dispose(); skidMarks.splice(i, 1); }
  }

  carMesh.fire1.visible = car.isBoosting || car.isInstantBoosting;
  carMesh.fire2.visible = car.isBoosting || car.isInstantBoosting;
  if(car.isBoosting || car.isInstantBoosting) {
      const scale = 1 + Math.random() * (car.isInstantBoosting ? 0.3 : 0.6);
      carMesh.fire1.scale.set(1, 1, scale); carMesh.fire2.scale.set(1, 1, scale);
  }

  if (isSliding && Math.abs(angleDiff) > 0.05 && car.speed > 1) {
    if (car.boosterCount < car.maxBoosters) {
      if (car.boostsGainedThisDrift < 2) {
        let chargeMultiplier = (car.isBoosting || car.isInstantBoosting) ? 1.6 : 2.2;
        car.gauge += Math.abs(angleDiff) * (car.speed * 0.4) * chargeMultiplier; 
        if (car.gauge >= 100) { car.boosterCount++; car.boostsGainedThisDrift++; car.gauge = 0; }
      }
    } else { car.gauge = 0; }
  }

  if (!isSliding && car.speed > 1.0 && keys.ArrowUp) {
      if (car.boosterCount < car.maxBoosters) {
          car.gauge += car.speed * 0.04; 
          if (car.gauge >= 100) {
              car.boosterCount++;
              car.gauge = 0;
          }
      }
  }

  document.getElementById('speedDisplay').innerText = Math.floor(Math.abs(car.speed) * 60);
  document.getElementById('gauge').style.width = car.gauge + '%';
  document.getElementById('slot1').className = car.boosterCount >= 1 ? 'slot filled' : 'slot';
  document.getElementById('slot2').className = car.boosterCount >= 2 ? 'slot filled' : 'slot';
  
  const status = document.getElementById('boostStatus');
  if(car.isBoosting) { status.innerText = "🚀 부스터 작동 중! 🚀"; status.style.color = "#3498db"; }
  else if(car.isInstantBoosting) { status.innerText = "💥 순간 부스터! 💥"; status.style.color = "#f1c40f"; }
  else if (car.boosterCount > 0) { status.innerText = "Ctrl 키를 눌러 부스터 발동!"; status.style.color = "#e74c3c"; }
  else { status.innerText = "드리프트(Shift)로 부스터를 모으세요"; status.style.color = "white"; }

  const dynamicDistance = (car.isBoosting || car.isInstantBoosting) ? 28 : 24; 
  const cameraAngle = car.speed >= -0.1 ? car.angle : car.velocityAngle;
  const cameraOffset = new THREE.Vector3(Math.sin(cameraAngle + Math.PI) * dynamicDistance, 20, Math.cos(cameraAngle + Math.PI) * dynamicDistance);
  camera.position.lerp(carMesh.position.clone().add(cameraOffset), 0.3); 
  const lookOffset = new THREE.Vector3(Math.sin(cameraAngle)*15, 0, Math.cos(cameraAngle)*15);
  cameraLookTarget.lerp(carMesh.position.clone().add(lookOffset), 0.3);
  camera.lookAt(cameraLookTarget);

  renderer.render(scene, camera);
}

// ==========================================
// 6. 시작 버튼 이벤트
// ==========================================
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('lobbyUI').style.display = 'none';
  document.getElementById('gameUI').style.display = 'block';
  document.getElementById('charModal').style.display = 'none'; 
  document.activeElement.blur(); 
  
  isGameRunning = true;
  cancelAnimationFrame(lobbyAnimId);
  
  car.angle = 0; car.velocityAngle = 0; 
  carMesh.rotation.y = 0;
  
  camera.position.set(carMesh.position.x, 20, carMesh.position.z - 24);
  camera.lookAt(carMesh.position);

  animateGame(); 
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (!isGameRunning) renderer.render(scene, camera);
});
</script>
</body>
</html>
