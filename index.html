<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>3D 카트라이더 (최종 통합 최적화판)</title>
<style>
  body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
  
  #gameUI { display: none; }
  #hud { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.65); padding: 15px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; }
  .gauge-container { width: 250px; height: 20px; background: rgba(255,255,255,0.2); border: 2px solid white; margin-top: 10px; border-radius: 10px; overflow: hidden; }
  #gauge { width: 0%; height: 100%; background: #3498db; transition: width 0.1s, background-color 0.2s; }
  #gauge.maxed { background: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
  
  #boosterSlots { display: flex; gap: 10px; margin-top: 10px; }
  .slot { width: 50px; height: 15px; border: 2px solid white; border-radius: 8px; background: rgba(0,0,0,0.5); transition: all 0.2s; }
  .slot.filled { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; }
  
  #lapDisplay { position: absolute; top: 20px; right: 20px; color: white; background: rgba(0,0,0,0.65); padding: 15px 25px; border-radius: 12px; font-size: 24px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; }
  
  .controls-info { position: absolute; bottom: 20px; left: 20px; color: rgba(255,255,255,0.9); font-size: 15px; background: rgba(0,0,0,0.65); padding: 10px 15px; border-radius: 8px; z-index: 10; }
  #techAlert { 
    position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
    font-size: 48px; color: #f1c40f; font-weight: 900; font-style: italic; 
    opacity: 0; transition: opacity 0.2s; text-shadow: 0 0 20px #e67e22, 3px 3px 0px #d35400; 
    z-index: 9999; pointer-events: none; text-align: center; line-height: 1.2;
  }

  #pauseMenu {
    display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  }
  #pauseMenu h1 { color: white; font-size: 64px; font-style: italic; margin-bottom: 30px; text-shadow: 4px 4px 0 #3498db; }
  .pause-btn {
    padding: 15px 50px; font-size: 24px; font-weight: bold; color: white; background: #2c3e50; border: 3px solid white;
    border-radius: 30px; cursor: pointer; transition: all 0.2s;
  }
  .pause-btn:hover { background: #3498db; transform: scale(1.05); }
  .pause-btn.red { background: #c0392b; }
  .pause-btn.red:hover { background: #e74c3c; }

  #lobbyUI {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 50px; z-index: 100;
    background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.15) 100%);
  }
  .lobby-title {
    position: absolute; top: 50px; font-size: 64px; color: white; font-weight: 900; font-style: italic;
    text-shadow: 4px 4px 0px #3498db, 8px 8px 15px rgba(0,0,0,0.5); letter-spacing: 2px;
  }
  .menu-container { display: flex; gap: 30px; margin-bottom: 40px; }
  .menu-btn {
    width: 140px; height: 140px; border-radius: 20px; border: 4px solid rgba(255,255,255,0.9);
    background: rgba(44, 62, 80, 0.85); color: white; font-size: 20px; font-weight: bold; cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); backdrop-filter: blur(5px);
  }
  .menu-btn:hover { transform: translateY(-10px) scale(1.05); background: rgba(52, 152, 219, 0.95); border-color: white; box-shadow: 0 15px 25px rgba(52, 152, 219, 0.5); }
  .menu-btn span { font-size: 40px; margin-bottom: 10px; }
  #startBtn {
    padding: 20px 80px; font-size: 32px; font-weight: 900; color: white; background: linear-gradient(135deg, #e74c3c, #c0392b);
    border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 8px 0px #902b1f, 0 15px 20px rgba(0,0,0,0.4); transition: all 0.1s; letter-spacing: 2px;
  }

  .modal-overlay {
    display: none; position: absolute; top: 50%; right: 50px; transform: translateY(-50%);
    background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px;
    box-shadow: -10px 10px 30px rgba(0,0,0,0.3); text-align: center; z-index: 200; flex-direction: column; gap: 15px; width: 280px; border: 3px solid #eee;
  }
  .modal-overlay h2 { margin: 0; color: #2c3e50; font-size: 26px; }
  .list-container { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
  .item-btn { padding: 15px; font-size: 20px; font-weight: bold; color: white; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
  .item-btn:hover { transform: scale(1.05) translateX(-5px); }

  .close-modal:active { transform: translateY(4px); box-shadow: 0 0px 0 #27ae60; }
  
  .c-dao { background: #1565c0; box-shadow: 0 4px 0 #0d47a1; } .c-bazzi { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; } .c-dizzy { background: #f1c40f; color: #333; box-shadow: 0 4px 0 #f39c12; }
  .m-vil { background: #27ae60; box-shadow: 0 4px 0 #1e8449; } .m-test { background: #95a5a6; box-shadow: 0 4px 0 #7f8c8d; }

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<body>

<script>
// ==========================================
// 1. Three.js 초기화 및 전역 변수
// ==========================================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
document.body.appendChild(renderer.domElement);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.85); scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(50, 100, 50); dirLight.castShadow = true;
dirLight.shadow.camera.top = 500; dirLight.shadow.camera.bottom = -500; dirLight.shadow.camera.left = -500; dirLight.shadow.camera.right = 500;
dirLight.shadow.mapSize.width = 2048; dirLight.shadow.mapSize.height = 2048;
scene.add(dirLight);

const mapGroup = new THREE.Group();
scene.add(mapGroup);

// 물리 엔진 OBB (기둥만 등록, 벽은 수학 연산)
const colliderGrid = new Map();
function addBoxCollider(x, z, w, d, rotY) {
    let box = {x, z, w, d, rot: rotY};
    let cx = Math.floor(x / 50), cz = Math.floor(z / 50);
    let key = cx + ',' + cz;
    if(!colliderGrid.has(key)) colliderGrid.set(key, []);
    colliderGrid.get(key).push(box);
}

const mapToWorld = (cx, cz) => ({ x: (cx / 2048) * 1024 - 512, z: (cz / 2048) * 1024 - 512 });

let currentMap = 'village';
let isGameRunning = false; 
let lobbyAnimId; 
let isPaused = false;
let carMesh;
let frameCount = 0;
let frontWheelL, frontWheelR; 

// 타이어 자국(스키드 마크) 풀링
const sharedSkidMat = new THREE.MeshBasicMaterial({ color: 0x222222, transparent: true, opacity: 0.5, depthWrite: false });
const skidMarks = []; 
const skidGeom = new THREE.PlaneGeometry(0.6, 1.0);
const MAX_SKIDS = 100;
const skidPoolL = []; const skidPoolR = [];
let skidIdx = 0;

for(let i=0; i<MAX_SKIDS; i++) {
    let mL = new THREE.Mesh(skidGeom, sharedSkidMat); mL.visible = false; scene.add(mL); skidPoolL.push(mL);
    let mR = new THREE.Mesh(skidGeom, sharedSkidMat); mR.visible = false; scene.add(mR); skidPoolR.push(mR);
}

const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, Shift: false, Control: false, r: false, R: false };

const MAX_NORMAL = 130 / 60; const MAX_INSTANT = 154 / 60; const MAX_BOOST = 220 / 60; const MAX_REVERSE = -100 / 60; 

const car = {
  speed: 0, accel: 0.02, boostAccel: 0.06, instantAccel: 0.035, turnSpeed: 0.045, driftTurnSpeed: 0.08, 
  grip: 0.18, driftGrip: 0.025, currentGrip: 0.18, angle: 0, velocityAngle: 0, gauge: 0, boosterCount: 0, maxBoosters: 2,
  isBoosting: false, boostTime: 0, driftState: 0, boostsGainedThisDrift: 0, lastAngleDiff: 0, 
  wasDrifting: false, instantBoostWindow: 0, canTriggerInstant: false, isInstantBoosting: false, instantBoostTimer: 0, toktokiTimer: 0,
  visualRoll: 0, rollVelocity: 0, visualPitch: 0, pitchVelocity: 0, steerAngle: 0,
  lap: 1, checkPoint: false, isFinished: false,
  shiftReleaseTime: 0, isDoubleDrifting: false, doubleDriftTimer: 0, driftStartDir: 0
};

const cameraLookTarget = new THREE.Vector3();
const uiSpeed = document.getElementById('speedDisplay');
const uiGauge = document.getElementById('gauge');
const uiSlot1 = document.getElementById('slot1');
const uiSlot2 = document.getElementById('slot2');
const uiBoostStatus = document.getElementById('boostStatus');
const uiLapCount = document.getElementById('lapCount');

// ==========================================
// 2. 맵 & 시각적 스마트 벽 (렌더링 최적화)
// ==========================================
const trackPointsCanvas = [
    [1400, 1750], [400, 1750], [400, 1500], [1500, 1500], [1500, 1250], 
    [300, 1250], [300, 1000], [1500, 1000], [1500, 750], [400, 750], 
    [400, 500], [900, 500], [900, 150], [1700, 150], 
    [1700, 900], [1900, 900], [1900, 1750], [1400, 1750]
];
const trackPointsWorld = trackPointsCanvas.map(p => mapToWorld(p[0], p[1]));

const shortcutSegmentsWorld = [
    { p1: mapToWorld(1200, 1500), p2: mapToWorld(1200, 1250) },
    { p1: mapToWorld(600, 1250), p2: mapToWorld(600, 1000) }
];

function inShortcutZone(x, z) {
    if (Math.abs(x - 88) < 45 && z > 90 && z < 260) return true;
    if (Math.abs(x - -212) < 45 && z > -40 && z < 140) return true;
    return false;
}

function createMapTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 2048; canvas.height = 2048; const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#6ab04c'; ctx.fillRect(0, 0, 2048, 2048);
    ctx.fillStyle = '#3498db'; ctx.fillRect(750, 50, 1050, 550); 
    ctx.lineWidth = 100; ctx.strokeStyle = '#e67e22'; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(1200, 1500); ctx.lineTo(1200, 1250); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(600, 1250); ctx.lineTo(600, 1000); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(trackPointsCanvas[0][0], trackPointsCanvas[0][1]);
    for(let i=1; i<trackPointsCanvas.length; i++) ctx.lineTo(trackPointsCanvas[i][0], trackPointsCanvas[i][1]);
    ctx.closePath();
    ctx.lineWidth = 180; ctx.strokeStyle = '#e74c3c'; ctx.stroke();
    ctx.setLineDash([40, 40]); ctx.strokeStyle = '#ecf0f1'; ctx.stroke(); ctx.setLineDash([]);
    ctx.lineWidth = 150; ctx.strokeStyle = '#7f8c8d'; ctx.stroke();
    ctx.lineWidth = 6; ctx.setLineDash([30, 30]); ctx.strokeStyle = '#f1c40f'; ctx.stroke(); ctx.setLineDash([]);
    ctx.lineWidth = 150; ctx.strokeStyle = '#8B4513'; 
    ctx.beginPath(); ctx.moveTo(900, 500); ctx.lineTo(900, 150); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(900, 150); ctx.lineTo(1700, 150); ctx.stroke();
    ctx.lineWidth = 4; ctx.strokeStyle = '#5C4033'; 
    for(let y=150; y<=500; y+=20) { ctx.beginPath(); ctx.moveTo(825, y); ctx.lineTo(975, y); ctx.stroke(); }
    for(let x=900; x<=1700; x+=20) { ctx.beginPath(); ctx.moveTo(x, 75); ctx.lineTo(x, 225); ctx.stroke(); }
    ctx.save(); ctx.translate(1400, 1750);
    for(let i = -15; i <= 15; i += 15) {
        for(let j = -75; j <= 75; j += 15) { ctx.fillStyle = (Math.abs(i/15 + j/15) % 2 === 0) ? '#111111' : '#ffffff'; ctx.fillRect(i, j, 15, 15); }
    }
    ctx.restore();
    const texture = new THREE.CanvasTexture(canvas); texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping; texture.anisotropy = 16;
    return texture;
}

// 💡 [렌더링 최적화] InstancedMesh 사용 및 그림자 완전 제거!
function buildSmartWalls() {
    const R = 48; const step = 2.5; const rawPoints = [];
    for (let i = 0; i < trackPointsWorld.length - 1; i++) {
        let p1 = trackPointsWorld[i], p2 = trackPointsWorld[i+1];
        let dx = p2.x - p1.x, dz = p2.z - p1.z;
        let len = Math.hypot(dx, dz); let nx = dz / len, nz = -dx / len;
        for (let d = 0; d <= len; d += step) {
            let cx = p1.x + dx * d / len, cz = p1.z + dz * d / len;
            rawPoints.push({x: cx + nx * R, z: cz + nz * R}); rawPoints.push({x: cx - nx * R, z: cz - nz * R});
        }
        for (let a = 0; a < Math.PI * 2; a += step / R) {
            rawPoints.push({x: p1.x + Math.cos(a) * R, z: p1.z + Math.sin(a) * R});
            rawPoints.push({x: p2.x + Math.cos(a) * R, z: p2.z + Math.sin(a) * R});
        }
    }
    const validPoints = rawPoints.filter(pt => {
        let minDist = Infinity;
        for (let i = 0; i < trackPointsWorld.length - 1; i++) {
            let p1 = trackPointsWorld[i], p2 = trackPointsWorld[i+1];
            let A = pt.x - p1.x, B = pt.z - p1.z, C = p2.x - p1.x, D = p2.z - p1.z;
            let dot = A * C + B * D, len_sq = C * C + D * D, param = (len_sq !== 0) ? dot / len_sq : -1;
            let xx, zz;
            if (param < 0) { xx = p1.x; zz = p1.z; } else if (param > 1) { xx = p2.x; zz = p2.z; } else { xx = p1.x + param * C; zz = p1.z + param * D; }
            let distSq = (pt.x - xx)*(pt.x - xx) + (pt.z - zz)*(pt.z - zz);
            if (distSq < minDist) minDist = distSq;
        }
        if (Math.sqrt(minDist) < R - 0.5) return false;
        if (inShortcutZone(pt.x, pt.z)) return false; 
        return true;
    });

    const WALL_H = 18; const TOP_H = 4;
    // 다각형 숫자를 5로 확 줄여서 연산 최적화
    const baseGeom = new THREE.CylinderGeometry(1.8, 1.8, WALL_H, 5); const topGeom = new THREE.CylinderGeometry(2.0, 2.0, TOP_H, 5);
    const baseMat = new THREE.MeshLambertMaterial({color: 0x95a5a6}); const topMat = new THREE.MeshLambertMaterial({color: 0x27ae60});
    const baseInst = new THREE.InstancedMesh(baseGeom, baseMat, validPoints.length); const topInst = new THREE.InstancedMesh(topGeom, topMat, validPoints.length);
    const dummy = new THREE.Object3D();
    
    validPoints.forEach((pt, idx) => {
        dummy.position.set(pt.x, WALL_H / 2, pt.z); dummy.updateMatrix(); baseInst.setMatrixAt(idx, dummy.matrix);
        dummy.position.set(pt.x, WALL_H + TOP_H / 2, pt.z); dummy.updateMatrix(); topInst.setMatrixAt(idx, dummy.matrix);
        // 🚨 절대 여기에 물리 엔진(addBoxCollider)를 넣지 않습니다. (순수 수학 연산으로 대체)
    });
    
    baseInst.instanceMatrix.needsUpdate = true; topInst.instanceMatrix.needsUpdate = true;
    baseInst.castShadow = false; topInst.castShadow = false; // 그림자 끄기!
    baseInst.receiveShadow = false; topInst.receiveShadow = false;
    mapGroup.add(baseInst); mapGroup.add(topInst);
}

function createTree(x, z) {
    const group = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 10), new THREE.MeshLambertMaterial({color: 0x795548}));
    trunk.position.y = 5; trunk.castShadow = true; group.add(trunk);
    const leaves = new THREE.Mesh(new THREE.SphereGeometry(12, 8, 8), new THREE.MeshLambertMaterial({color: 0x27ae60}));
    leaves.position.y = 15; leaves.castShadow = true; group.add(leaves);
    group.position.set(x, 0, z); mapGroup.add(group);
}
function createHouse(x, z, rotY) {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(30, 20, 30), new THREE.MeshLambertMaterial({color: 0xffeaa7}));
    body.position.y = 10; body.castShadow = true; group.add(body);
    const roof = new THREE.Mesh(new THREE.ConeGeometry(24, 15, 4), new THREE.MeshLambertMaterial({color: 0xd35400}));
    roof.position.y = 27.5; roof.rotation.y = Math.PI / 4; roof.castShadow = true; group.add(roof);
    group.position.set(x, 0, z); group.rotation.y = rotY; mapGroup.add(group);
}
function createClockTower(x, z) {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(20, 50, 20), new THREE.MeshLambertMaterial({color: 0xecf0f1}));
    body.position.y = 25; body.castShadow = true; group.add(body);
    const roof = new THREE.Mesh(new THREE.ConeGeometry(18, 20, 4), new THREE.MeshLambertMaterial({color: 0x2980b9}));
    roof.position.y = 60; roof.rotation.y = Math.PI / 4; roof.castShadow = true; group.add(roof);
    const clock = new THREE.Mesh(new THREE.CircleGeometry(6, 16), new THREE.MeshBasicMaterial({color: 0xffffff}));
    clock.position.set(0, 40, 10.1); group.add(clock);
    group.position.set(x, 0, z); mapGroup.add(group);
}

function createStartBanner(x, z, rotY) {
    const group = new THREE.Group(); const mat = new THREE.MeshLambertMaterial({color: 0x2c3e50});
    const p1 = new THREE.Mesh(new THREE.BoxGeometry(4, 35, 4), mat); p1.position.set(0, 17.5, -60); p1.castShadow = true; group.add(p1);
    const p2 = new THREE.Mesh(new THREE.BoxGeometry(4, 35, 4), mat); p2.position.set(0, 17.5, 60); p2.castShadow = true; group.add(p2);
    
    // 오직 이 배너 기둥만 물리(OBB) 충돌 대상으로 남겨둡니다.
    let sin = Math.sin(rotY), cos = Math.cos(rotY);
    addBoxCollider(x + (-60)*(-sin), z + (-60)*cos, 4, 4, rotY);
    addBoxCollider(x + (60)*(-sin), z + (60)*cos, 4, 4, rotY);

    const topBox = new THREE.Mesh(new THREE.BoxGeometry(4, 12, 124), new THREE.MeshLambertMaterial({color: 0x3498db}));

function animateGame() {
  if (!isGameRunning) return;
  requestAnimationFrame(animateGame);
  frameCount++;

  if (isPaused) { renderer.render(scene, camera); return; } 

  let prevX = carMesh.position.x; 

  if (car.isFinished) {
      keys.ArrowUp = false; keys.ArrowDown = false; keys.Shift = false; keys.Control = false;
      car.speed *= 0.95; 
  }

  if (keys.Control && car.boosterCount > 0 && !car.isBoosting && car.speed >= 0) { car.isBoosting = true; car.boosterCount--; car.boostTime = 150; }
  if (car.isBoosting) { car.boostTime--; if(car.boostTime <= 0) car.isBoosting = false; }

  let absSpeed = Math.abs(car.speed);
  let isDrifting = keys.Shift && absSpeed > 0.5;
  
  if (car.isDoubleDrifting) {
      car.doubleDriftTimer--;
      if (car.doubleDriftTimer <= 0 || !keys.Shift) car.isDoubleDrifting = false;
  }

  if (isDrifting) car.driftState = 1; else if (car.driftState === 1 && Math.abs(car.lastAngleDiff) > 0.1) car.driftState = 2; else if (car.driftState === 2 && Math.abs(car.lastAngleDiff) < 0.04) car.driftState = 0; else if (!isDrifting && Math.abs(car.lastAngleDiff) < 0.1) car.driftState = 0; 
  if (car.driftState === 0) car.boostsGainedThisDrift = 0; 
  let isDragging = (car.driftState === 2); let isSliding = isDrifting || isDragging; 

  if (!isDrifting && car.wasDrifting && Math.abs(car.lastAngleDiff) > 0.08 && car.speed >= 0) { car.instantBoostWindow = 30; car.canTriggerInstant = !keys.ArrowUp; }
  if (car.instantBoostWindow > 0) {
    car.instantBoostWindow--;
    if (car.speed >= 0 && !keys.ArrowUp) car.canTriggerInstant = true;
    if (car.speed >= 0 && keys.ArrowUp && car.canTriggerInstant && !car.isInstantBoosting) {
      car.isInstantBoosting = true; car.instantBoostTimer = 30; car.instantBoostWindow = 0; car.speed += 0.3; showTechAlert("순간 부스터!", "#f1c40f");
      if (Math.abs(car.lastAngleDiff) < 0.3) { car.driftState = 0; car.currentGrip = 0.8; }
    }
  }
  if (car.isInstantBoosting) { car.instantBoostTimer--; if (car.instantBoostTimer <= 0) car.isInstantBoosting = false; }
  
  let boostGained = false;
  if (car.wasDrifting && !isSliding) {
      if (car.gauge >= 100 && car.boosterCount < car.maxBoosters) {
          car.boosterCount++; car.gauge = 0; boostGained = true;
      }
  }
  car.wasDrifting = isDrifting; 

  let currentMax = car.isBoosting ? MAX_BOOST : (car.isInstantBoosting ? MAX_INSTANT : MAX_NORMAL);
  let currentAccel = car.isBoosting ? car.boostAccel : (car.isInstantBoosting ? car.instantAccel : car.accel);
  let hardLimit = currentMax;

  let speedPenalty = Math.max(0.65, 1.0 - (absSpeed / 8.0)); 
  let tSpeed = (isSliding ? car.driftTurnSpeed : car.turnSpeed) * speedPenalty;
  if (car.isDoubleDrifting) tSpeed *= 1.45; 

  let targetSteer = 0; let steerDir = (car.speed >= 0) ? 1 : -1; 
  if (absSpeed > 0.1) {
    if (keys.ArrowLeft) { car.angle += tSpeed * steerDir; targetSteer = 0.5 * steerDir; }
    if (keys.ArrowRight) { car.angle -= tSpeed * steerDir; targetSteer = -0.5 * steerDir; }
  }
  car.steerAngle += (targetSteer - car.steerAngle) * 0.2; frontWheelL.rotation.y = car.steerAngle; frontWheelR.rotation.y = car.steerAngle;

  let angleDiff = car.angle - car.velocityAngle;
  while (angleDiff > Math.PI) angleDiff -= Math.PI * 2; while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
  if (isSliding) {
      if (angleDiff > Math.PI) { car.angle = car.velocityAngle + Math.PI; angleDiff = Math.PI; } else if (angleDiff < -Math.PI) { car.angle = car.velocityAngle - Math.PI; angleDiff = -Math.PI; }
  }
  car.lastAngleDiff = angleDiff;

  let targetGrip = isSliding ? car.driftGrip : car.grip;
  if (car.isDoubleDrifting) targetGrip = 0.035; 

  let isOppositeDir = false; let isSpinningOut = Math.abs(angleDiff) > 1.5; 
  if (!isSpinningOut) {
      if (steerDir === 1) isOppositeDir = (angleDiff > 0.2 && keys.ArrowRight) || (angleDiff < -0.2 && keys.ArrowLeft);
      else isOppositeDir = (angleDiff > 0.2 && keys.ArrowLeft) || (angleDiff < -0.2 && keys.ArrowRight);
  }
  if (isSliding && isOppositeDir) { targetGrip = 0.5; car.driftState = 0; if (Math.abs(angleDiff) > 0.3 && Math.random() < 0.1 && car.speed >= 0) showTechAlert("뉴커팅!", "#e74c3c"); }
  
  let gripRecoverySpeed = isDrifting ? 0.2 : (isDragging ? 0.005 : 0.1); 
  car.currentGrip += (targetGrip - car.currentGrip) * gripRecoverySpeed; car.velocityAngle += angleDiff * car.currentGrip;

  let speedBefore = car.speed; let drag = 0.002 * (absSpeed * absSpeed); 
  if (keys.ArrowUp) { car.speed += currentAccel; if (car.speed > 0) car.speed -= drag; else car.speed += drag; } 
  else if (keys.ArrowDown) { car.speed -= 0.03; if (car.speed > 0) car.speed -= drag; else car.speed += drag; } 
  else { if (car.speed > 0) car.speed = Math.max(0, car.speed - drag - 0.01); else if (car.speed < 0) car.speed = Math.min(0, car.speed + drag + 0.01); }

  if (isDrifting) {
      if (keys.ArrowUp && car.speed > 0) { car.speed *= 0.996; if (Math.abs(angleDiff) > 1.0) car.speed *= 0.99; } 
      else if (keys.ArrowDown && car.speed < 0) { car.speed *= 0.996; if (Math.abs(angleDiff) > 1.0) car.speed *= 0.99; }
  }

  let isUserTokToki = isDragging && keys.ArrowUp && ((angleDiff > 0.15 && keys.ArrowLeft) || (angleDiff < -0.15 && keys.ArrowRight)) && Math.abs(angleDiff) < 0.95 && (car.isBoosting || car.isInstantBoosting);
  if (isUserTokToki) { car.speed += 0.015; car.toktokiTimer = 45; if (Math.random() < 0.05) showTechAlert("톡톡이 가속!", "#3498db"); } 
  else if (isDragging && keys.ArrowUp) { car.speed += 0.001; }

  if (car.toktokiTimer > 0) { car.toktokiTimer--; hardLimit = car.isBoosting ? 240/60 : (car.isInstantBoosting ? 154/60 : 135/60); } 
  else if (isDragging) { hardLimit = car.isBoosting ? 230/60 : (car.isInstantBoosting ? 154/60 : 130/60); }

  if (car.speed > hardLimit) car.speed = (speedBefore > hardLimit + 0.03) ? Math.min(car.speed, speedBefore - 0.03) : hardLimit;
  if (car.speed < MAX_REVERSE) car.speed = MAX_REVERSE; 

  carMesh.position.x += Math.sin(car.velocityAngle) * car.speed;
  carMesh.position.z += Math.cos(car.velocityAngle) * car.speed;
  
  let px = carMesh.position.x, pz = carMesh.position.z;
  
  let minDistTrack = Infinity, closestXx = 0, closestZz = 0, cI = 0;
  if (currentMap === 'village') {
      for (let i = 0; i < trackPointsWorld.length - 1; i++) {
          let p1 = trackPointsWorld[i], p2 = trackPointsWorld[i+1];
          let A = px - p1.x, B = pz - p1.z, C = p2.x - p1.x, D = p2.z - p1.z;
          let dot = A*C + B*D, len_sq = C*C + D*D, param = (len_sq !== 0) ? dot / len_sq : -1;
          let xx, zz;
          if (param < 0) { xx = p1.x; zz = p1.z; } else if (param > 1) { xx = p2.x; zz = p2.z; } else { xx = p1.x + param*C; zz = p1.z + param*D; }
          let distSq = (px - xx)*(px - xx) + (pz - zz)*(pz - zz);
          if (distSq < minDistTrack) { minDistTrack = distSq; closestXx = xx; closestZz = zz; cI = i; }
      }
  }

  if (keys.r || keys.R) {
      if (currentMap === 'village') {
          carMesh.position.set(closestXx, 0, closestZz);
          let dx = trackPointsWorld[cI+1].x - trackPointsWorld[cI].x;
          let dz = trackPointsWorld[cI+1].z - trackPointsWorld[cI].z;
          car.angle = Math.atan2(dx, dz); car.velocityAngle = car.angle;
      } else {
          carMesh.position.set(0, 0, 0); car.angle = 0; car.velocityAngle = 0;
      }
      car.speed = 0; car.driftState = 0; car.isBoosting = false; car.isInstantBoosting = false; car.visualRoll = 0;
      showTechAlert("🔄 복귀!", "#2ecc71"); keys.r = false; keys.R = false; return; 
  }

  // OBB 충돌 검사 (배너 기둥 전용, 렉 없음)
  let hitWall = false, bounceNx = 0, bounceNz = 0;
  let gridX = Math.floor(px / 50), gridZ = Math.floor(pz / 50);
  for(let i = -1; i <= 1; i++) {
      for(let j = -1; j <= 1; j++) {
          let key = (gridX + i) + ',' + (gridZ + j);
          let boxes = colliderGrid.get(key);
          if (boxes) {
              for (let box of boxes) {
                  let dx = px - box.x, dz = pz - box.z;
                  let cosR = Math.cos(-box.rot), sinR = Math.sin(-box.rot);
                  let lx = dx * cosR - dz * sinR, lz = dx * sinR + dz * cosR;
                  let hW = box.w / 2, hD = box.d / 2;
                  let cx = Math.max(-hW, Math.min(hW, lx)), cz = Math.max(-hD, Math.min(hD, lz));
                  let wCos = Math.cos(box.rot), wSin = Math.sin(box.rot);
                  let closestX = box.x + (cx * wCos - cz * wSin);
                  let closestZ = box.z + (cx * wSin + cz * wCos);
                  let distToWall = Math.hypot(px - closestX, pz - closestZ);
                  let carRadius = 2.0; 
                  
                  if (distToWall < carRadius) {
                      let pen = carRadius - distToWall;
                      let nx, nz;
                      if (distToWall === 0) {
                          if (hW - Math.abs(lx) < hD - Math.abs(lz)) { nx = Math.sign(lx) * wCos; nz = Math.sign(lx) * wSin; pen = (hW - Math.abs(lx)) + carRadius; } 
                          else { nx = -Math.sign(lz) * wSin; nz = Math.sign(lz) * wCos; pen = (hD - Math.abs(lz)) + carRadius; }
                      } else {
                          nx = (px - closestX) / distToWall; nz = (pz - closestZ) / distToWall;
                      }
                      px += nx * pen; pz += nz * pen;
                      hitWall = true; bounceNx = nx; bounceNz = nz;
                  }
              }
          }
      }
  }

  // 💡 [핵심] 수학적 곡선 벽 마감 (12000번 반복 연산 없이 100% 최적화 됨)
  if (currentMap === 'village') {
      let finalDistSq = minDistTrack;
      let finalClosestX = closestXx;
      let finalClosestZ = closestZz;
      let inShortcut = false;

      for (let seg of shortcutSegmentsWorld) {
          let A = px - seg.p1.x, B = pz - seg.p1.z, C = seg.p2.x - seg.p1.x, D = seg.p2.z - seg.p1.z;
          let dot = A*C + B*D, len_sq = C*C + D*D, param = (len_sq !== 0) ? dot / len_sq : -1;
          let xx, zz;
          if (param < 0) { xx = seg.p1.x; zz = seg.p1.z; } else if (param > 1) { xx = seg.p2.x; zz = seg.p2.z; } else { xx = seg.p1.x + param*C; zz = seg.p1.z + param*D; }
          let distSq = (px - xx)*(px - xx) + (pz - zz)*(pz - zz);
          if (distSq < finalDistSq) { 
              finalDistSq = distSq; finalClosestX = xx; finalClosestZ = zz; inShortcut = true; 
          }
      }

      let distTrack = Math.sqrt(finalDistSq);
      
      // 오프로드
      if (distTrack > 38 && distTrack <= 48) { 
          if (car.speed > 1.2) car.speed *= 0.94; 
          if (car.speed < -0.5) car.speed *= 0.94;
          car.currentGrip = 0.03; 
      }

      // 수학적 벽 튕김 (지름길이면 뚫고 나감)
      if (distTrack > 48 && !inShortcut) {
          let nx = (px - finalClosestX) / distTrack, nz = (pz - finalClosestZ) / distTrack;
          px = finalClosestX + nx * 48; 
          pz = finalClosestZ + nz * 48;
          hitWall = true; bounceNx = nx; bounceNz = nz;
      }
      
      let distToHalf = Math.hypot(px - (-362), pz - (-12)); 
      if (distToHalf < 200) car.checkPoint = true; 
      
      let finishX = 188, finishZ = 363; 
      if (prevX > finishX && px <= finishX && Math.abs(pz - finishZ) < 80) {
          if (car.checkPoint && car.speed > 0 && !car.isFinished) {
              car.lap++; car.checkPoint = false;
              if (car.lap > 3) {
                  car.isFinished = true;
                  showTechAlert("🏁 FINISH! 🏁<br><span style='font-size:24px; color:white;'>5초 후 로비로 이동합니다.</span>", "#f1c40f", 5000);
                  setTimeout(exitToLobby, 5000);
              } else {
                  uiLapCount.innerText = car.lap; showTechAlert("LAP " + car.lap, "#3498db");
              }
          }
      }
  }

  // 충돌 게이지 삭감 및 튕겨내기 처리
  if (hitWall) {
      let vx = Math.sin(car.velocityAngle) * car.speed, vz = Math.cos(car.velocityAngle) * car.speed;
      let dotProduct = vx * bounceNx + vz * bounceNz;
      if (dotProduct < 0) {
          vx -= 1.6 * dotProduct * bounceNx; vz -= 1.6 * dotProduct * bounceNz;
          let impactSpeed = Math.abs(dotProduct);
          car.speed = Math.sqrt(vx*vx + vz*vz) * 0.4; if (car.speed > 0.01) car.velocityAngle = Math.atan2(vx, vz);
          car.driftState = 0; 
          let gaugeLoss = impactSpeed * 30; 
          car.gauge = Math.max(0, car.gauge - gaugeLoss); 
          car.visualRoll += (Math.random() - 0.5) * 0.8; 
          showTechAlert("💥 충돌! -" + Math.floor(gaugeLoss), "#e74c3c");
      }
  }
  carMesh.position.x = px; carMesh.position.z = pz;

  carMesh.rotation.y = car.angle;
  const springStiffness = 0.1; const damping = 0.85; 
  let clampedRollDiff = Math.max(-1.5, Math.min(1.5, angleDiff));
  let targetRoll = Math.max(-0.25, Math.min(0.25, -clampedRollDiff * (absSpeed / 4.0) * 0.4)); 
  car.rollVelocity = (car.rollVelocity + (targetRoll - car.visualRoll) * springStiffness) * damping; car.visualRoll += car.rollVelocity;
  carMesh.bodyWrapper.rotation.z = car.visualRoll;

  let targetPitch = keys.ArrowUp ? -0.04 * (car.speed / 4.0) : (keys.ArrowDown ? 0.08 * (Math.max(car.speed, 0) / 4.0) : 0); 
  if (car.isBoosting || car.isInstantBoosting) targetPitch = -0.1; 
  car.pitchVelocity = (car.pitchVelocity + (targetPitch - car.visualPitch) * springStiffness) * damping; car.visualPitch += car.pitchVelocity;
  carMesh.bodyWrapper.rotation.x = car.visualPitch;

  if (Math.abs(angleDiff) > 0.08 && absSpeed > 0.5 && car.currentGrip < 0.12 && frameCount % 2 === 0) {
    const dirX = Math.sin(car.angle), dirZ = Math.cos(car.angle), rightX = Math.cos(car.angle), rightZ = -Math.sin(car.angle);
    let mL = skidPoolL[skidIdx];
    mL.rotation.x = -Math.PI / 2; mL.rotation.z = -car.angle;
    mL.position.set(carMesh.position.x - dirX*2.0 - rightX*1.5, 0.05, carMesh.position.z - dirZ*2.0 - rightZ*1.5);
    mL.scale.x = 1.0; mL.life = 40; mL.visible = true;
    let mR = skidPoolR[skidIdx];
    mR.rotation.x = -Math.PI / 2; mR.rotation.z = -car.angle;
    mR.position.set(carMesh.position.x - dirX*2.0 + rightX*1.5, 0.05, carMesh.position.z - dirZ*2.0 + rightZ*1.5);
    mR.scale.x = 1.0; mR.life = 40; mR.visible = true;
    skidIdx = (skidIdx + 1) % MAX_SKIDS;
  }
  for (let i = 0; i < MAX_SKIDS; i++) {
    if(skidPoolL[i].visible) { skidPoolL[i].life--; skidPoolL[i].scale.x *= 0.95; if(skidPoolL[i].life <= 0) skidPoolL[i].visible = false; }
    if(skidPoolR[i].visible) { skidPoolR[i].life--; skidPoolR[i].scale.x *= 0.95; if(skidPoolR[i].life <= 0) skidPoolR[i].visible = false; }
  }

  carMesh.fire1.visible = carMesh.fire2.visible = (car.isBoosting || car.isInstantBoosting);
  if(car.isBoosting || car.isInstantBoosting) {
      const scale = 1 + Math.random() * (car.isInstantBoosting ? 0.3 : 0.6);
      carMesh.fire1.scale.set(1, 1, scale); carMesh.fire2.scale.set(1, 1, scale);
  }

  if (isSliding && Math.abs(angleDiff) > 0.05 && car.speed > 1) {
    if (car.boosterCount < car.maxBoosters) {
      if (car.boostsGainedThisDrift < 1) {
        let multi = (car.isBoosting || car.isInstantBoosting) ? 1.6 : 2.2;
        if (car.isDoubleDrifting) multi *= 1.5;
        car.gauge += Math.abs(angleDiff) * (car.speed * 0.3) * multi; 
        if (car.gauge >= 100) { car.gauge = 100; }
      }
    } else { car.gauge = 0; }
  }
  if (!isSliding && car.speed > 1.0 && keys.ArrowUp) {
      if (car.boosterCount < car.maxBoosters) {
          car.gauge += car.speed * 0.04; 
          if (car.gauge >= 100) { car.boosterCount++; car.gauge = 0; boostGained = true; }
      }
  }

  if (boostGained) showTechAlert("부스터 획득!", "#3498db");

  uiSpeed.innerText = Math.floor(Math.abs(car.speed) * 60);
  uiGauge.style.width = car.gauge + '%';
  if (car.gauge >= 100) uiGauge.classList.add('maxed'); else uiGauge.classList.remove('maxed');
  uiSlot1.className = car.boosterCount >= 1 ? 'slot filled' : 'slot';
  uiSlot2.className = car.boosterCount >= 2 ? 'slot filled' : 'slot';
  
  if(car.isBoosting) { uiBoostStatus.innerText = "🚀 부스터 작동 중! 🚀"; uiBoostStatus.style.color = "#3498db"; }
  else if(car.isInstantBoosting) { uiBoostStatus.innerText = "💥 순간 부스터! 💥"; uiBoostStatus.style.color = "#f1c40f"; }
  else if (car.boosterCount > 0) { uiBoostStatus.innerText = "Ctrl 키를 눌러 부스터 발동!"; uiBoostStatus.style.color = "#e74c3c"; }
  else { uiBoostStatus.innerText = "드리프트(Shift)로 부스터를 모으세요"; uiBoostStatus.style.color = "white"; }

  const dynDist = (car.isBoosting || car.isInstantBoosting) ? 28 : 24; 
  const camAng = car.speed >= -0.1 ? car.angle : car.velocityAngle;
  camera.position.lerp(carMesh.position.clone().add(new THREE.Vector3(Math.sin(camAng+Math.PI)*dynDist, 20, Math.cos(camAng+Math.PI)*dynDist)), 0.3); 
  cameraLookTarget.lerp(carMesh.position.clone().add(new THREE.Vector3(Math.sin(camAng)*15, 0, Math.cos(camAng)*15)), 0.3);
  camera.lookAt(cameraLookTarget);

  renderer.render(scene, camera);
}
</script>
